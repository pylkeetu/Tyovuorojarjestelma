{% extends "base.html" %}

{% block title %}Muokkaa treeniä{% endblock %}

{% block content %}

<h1>Muokkaa treeniä</h1>

<form action="/exercise/{{ exercise['id'] }}/edit" method="POST">

  <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}">

  <label>Kategoria:</label><br>

  <div class="category-box">
    {% for category in categories %}
      <label class="category-item">
        <input type="radio"
               name="category"
               value="{{ category.id }}"
               {% if category.id == exercise['category_id'] %}checked{% endif %}
               required>
        {{ category.name }}
      </label>
    {% endfor %}
  </div>

  <br>

  <label>Kuvaus:</label><br>
  <textarea name="description"
            rows="5"
            maxlength="80"
            required>{{ exercise['description'] }}</textarea>

  <br><br>

  <label>Max osallistujat:</label><br>
  <input type="number"
         name="participants"
         value="{{ exercise['max_participants'] }}"
         min="1"
         max="100"
         required>

  <br><br>

  <button type="submit">Tallenna muutokset</button>
</form>

<br>

<a href="/exercise/{{ exercise['id'] }}">← Peruuta</a>

{% endblock %}
