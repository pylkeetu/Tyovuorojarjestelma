<!DOCTYPE html>
<html>

<head>
  <title>Työvuorojärjestelmä</title>
</head>

<body>
  <h1>Työvuorojärjestelmä</h1>

  {% if session.username %}
  <p>
    Olet kirjautunut nimellä {{ session.username }}, olet työntekijä numero {{ session.employee_id }}
  </p>
  {% endif %}

  <p>
    <a href="/login">Kirjaudu sisään</a>
    <a href="/register">Luo tunnus</a>
    <a href="/logout">Kirjaudu ulos</a>
  </p>

  <p>
    <a href="/new_shift">Uusi työvuoro</a>
  </p>
</body>

</html>
