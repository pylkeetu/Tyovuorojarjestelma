{% extends "base.html" %}

{% block title %}Uusi treeni{% endblock %}

{% block content %}

<h2>Uusi treeni</h2>

<form action="/create_exercise" method="post">

  <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}">

  <p><b>Valitse treenin tyyppi:</b></p>

  <div class="category-box">
    {% for category in categories %}
      <label class="category-item">
        <input type="radio" name="category" value="{{ category.id }}" required>
        {{ category.name }}
      </label>
    {% endfor %}
  </div>

  <br>

  <p>
    <b>Kuvaus (max 100 merkkiä)</b><br>
    <textarea name="description" rows="6" maxlength="100" required></textarea>
  </p>

  <p>
    <b>Max osallistujat</b><br>
    <input type="number" name="participants" min="1" max="100" required>
  </p>

  <button type="submit">Luo treeni</button>

</form>

<br>
<a href="/">Takaisin etusivulle</a>

{% endblock %}
